# @package _global_
defaults:
  - _self_

seed: 42
device: cuda

model:
  hidden_dim: 64
  n_layers: 3
  dropout: 0.1
  var_input_dim: 12
  con_input_dim: 5

training:
  optimizer: adam
  lr: 1.0e-3
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-5
  lr_schedule: cosine
  warmup_steps: 1000
  batch_size: 32
  n_steps: 200000
  early_stopping_patience: 20000
  grad_clip: 1.0
  checkpoint_every: 5000

data:
  train_split: train
  val_split: val_id
  n_workers: 4
  pin_memory: true

logging:
  wandb_project: ngbb-routing
  log_every: 100
